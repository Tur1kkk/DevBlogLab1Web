<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій Блог - Головна</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1; }
    </style>
</head>
<body>

    <header class="bg-dark text-white p-3">
        <div class="container d-flex justify-content-between align-items-center">
            <h1>DevBlog</h1>
            <nav>
                <ul class="nav">
                    <li class="nav-item"><a href="index.html" class="nav-link text-white">Головна</a></li>
                    <li class="nav-item"><a href="profile.html" class="nav-link text-white">Профіль</a></li>
                    <li class="nav-item"><a href="about.html" class="nav-link text-white">Про додаток</a></li>
                    <li class="nav-item"><a href="login.html" id="logout-btn" class="nav-link text-white">Вихід</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container my-5">
        <div class="row">
            <div class="col-md-8">
                <h2 class="mb-4">Стрічка повідомлень</h2>
                
                <div id="posts-container"></div>
                </div>

                <div id="posts-container"></div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 sticky-top" style="top: 20px;">
                    <h4>Створити пост</h4>
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Назва</label>
                            <input type="text" id="post-title" class="form-control" placeholder="Заголовок повідомлення">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Текст</label>
                            <textarea id="post-content" class="form-control" rows="4" placeholder="Про що хочете написати?"></textarea>
                        </div>
                        <button type="button" id="add-post-btn" class="btn btn-primary w-100">Опублікувати</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-light text-center py-3 border-top">
        <div class="container">
            <p class="mb-0">&copy; 2026 Лабораторна робота №1. Виконав студент групи КВ-31 Ющук Артур.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	
	<script src="model.js"></script>
    <script src="view.js"></script>
    <script src="controller.js"></script>
	
	<script src="auth.js"></script>
</body>
</html>
