<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація - DevBlog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1; }
    </style>
</head>
<body>

    <header class="bg-dark text-white p-3">
        <div class="container d-flex justify-content-between align-items-center">
            <h1>DevBlog</h1>
            <nav>
                <ul class="nav">
                    <li class="nav-item"><a href="index.html" class="nav-link text-white">Головна</a></li>
                    <li class="nav-item"><a href="profile.html" class="nav-link text-white">Профіль</a></li>
                    <li class="nav-item"><a href="about.html" class="nav-link text-white">Про додаток</a></li>
                    <li class="nav-item"><a href="login.html" class="nav-link text-white">Вхід</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h2 class="text-center mb-4">Реєстрація користувача</h2>
                        <form id="reg-form">
                            <div class="mb-3">
                                <label class="form-label">Ім'я</label>
                                <input id="reg-name" type="text" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input id="reg-email" type="email" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label d-block">Стать</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="male" value="male">
                                    <label class="form-check-label" for="male">Чоловіча</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                                    <label class="form-check-label" for="female">Жіноча</label>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Дата народження</label>
                                <input id="reg-dob" type="date" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Пароль</label>
                                <input id="reg-password" type="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Створити акаунт</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-light text-center py-3 border-top">
        <div class="container">
            <p class="mb-0">2026 Лабораторна робота №1. Виконав студент групи КВ-31 Ющук Артур.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="auth.js"></script>
</body>
</html>
